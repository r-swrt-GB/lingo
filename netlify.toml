[build]
  command = "bun run build && cp -r dist/server netlify/functions/server-dist"
  publish = "dist/client"

[build.environment]
  BUN_VERSION = "1.2.0"
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"

# No redirects needed: the SSR function declares `path: "/*"` (with
# `/assets/*` and `/images/*` excluded) in server.mjs, which handles all
# routing. Static assets are served directly from the CDN.
